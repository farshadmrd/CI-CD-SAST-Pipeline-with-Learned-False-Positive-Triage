services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: jenkins-docker:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      # REPLACE 999 with your host docker gid: run `stat -c '%g' /var/run/docker.sock`
      - "984"

  # Built so the image exists in the host daemon, but NOT run as a service.
  # Jenkins launches it per build via the Docker Pipeline plugin. The profile
  # keeps it out of `docker compose up`; the image tag must match the Jenkinsfile.
  infer-agent:
    build:
      context: .
      dockerfile: sast-tools/Dockerfile.agent
    image: infer-agent:1.2.0
    profiles: ["build-only"]
    command: ["true"]

  # Same pattern as infer-agent: built so the image exists in the host daemon,
  # but not run as a service. Jenkins launches it per build to run cppcheck.
  # The image tag must match the one referenced in the Jenkinsfile.
  cppcheck-agent:
    build:
      context: .
      dockerfile: sast-tools/cppcheck-agent.Dockerfile
    image: cppcheck-agent:2.13.0
    profiles: ["build-only"]
    command: ["true"]

  # Same pattern again: built so the image exists in the host daemon, but not
  # run as a service. Jenkins launches it per build to run Horusec, which
  # orchestrates per-language tool containers via the mounted docker socket.
  # The image tag must match the one referenced in the Jenkinsfile.
  horusec-agent:
    build:
      context: .
      dockerfile: sast-tools/horusec-agent.Dockerfile
    image: horusec-agent:latest
    profiles: ["build-only"]
    command: ["true"]

volumes:
  jenkins_home:
